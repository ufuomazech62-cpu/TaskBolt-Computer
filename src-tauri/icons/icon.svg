<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbGradient" cx="35%" cy="25%">
      <stop offset="0%" stop-color="#FFD54A"/>
      <stop offset="20%" stop-color="#FF9A1F"/>
      <stop offset="50%" stop-color="#FF2F92"/>
      <stop offset="80%" stop-color="#C026FF"/>
      <stop offset="100%" stop-color="#6D28FF"/>
    </radialGradient>
    <radialGradient id="glassHighlight" cx="30%" cy="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim">
      <stop offset="0%" stop-color="#FFE5B8"/>
      <stop offset="50%" stop-color="#FF6CCF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="170" fill="#FF4FAE" opacity="0.45" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="160" fill="url(#orbGradient)"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#rim)" stroke-width="3" opacity="0.9"/>
  <ellipse cx="215" cy="195" rx="95" ry="65" fill="url(#glassHighlight)" opacity="0.7"/>
  <ellipse cx="250" cy="350" rx="115" ry="45" fill="white" opacity="0.12"/>
  <rect class="logo-eye" x="205" y="175" width="52" height="95" rx="26" fill="white" opacity="0.95"/>
  <rect class="logo-eye" x="295" y="165" width="52" height="95" rx="26" fill="white" opacity="0.95"/>
</svg>
