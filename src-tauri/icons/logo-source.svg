<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb" cx="35%" cy="25%">
      <stop offset="0%" stop-color="#FFD54A" />
      <stop offset="20%" stop-color="#FF9A1F" />
      <stop offset="50%" stop-color="#FF2F92" />
      <stop offset="80%" stop-color="#C026FF" />
      <stop offset="100%" stop-color="#6D28FF" />
    </radialGradient>
    <radialGradient id="glass" cx="30%" cy="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.85" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="rim">
      <stop offset="0%" stop-color="#FFE5B8" />
      <stop offset="50%" stop-color="#FF6CCF" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="170" fill="#FF4FAE" opacity="0.45" filter="url(#glow)" />
  <!-- Main orb -->
  <circle cx="256" cy="256" r="160" fill="url(#orb)" />
  <!-- Rim -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#rim)" stroke-width="3" opacity="0.9" />
  <!-- Glass highlight -->
  <ellipse cx="215" cy="195" rx="95" ry="65" fill="url(#glass)" opacity="0.7" />
  <!-- Bottom shine -->
  <ellipse cx="250" cy="350" rx="115" ry="45" fill="white" opacity="0.12" />
  <!-- Left eye -->
  <ellipse cx="231" cy="222" rx="26" ry="47" fill="white" opacity="0.95" />
  <!-- Right eye -->
  <ellipse cx="321" cy="212" rx="26" ry="47" fill="white" opacity="0.95" />
</svg>