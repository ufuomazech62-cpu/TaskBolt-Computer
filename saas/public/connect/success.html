<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected — TaskBolt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; }
    .icon { width: 64px; height: 64px; background: rgba(34,197,94,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 32px; height: 32px; color: #22c55e; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; color: #fafafa; }
    p { font-size: 0.95rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 32px; }
    .close-btn { background: #22c55e; color: #000; border: none; border-radius: 10px; padding: 12px 32px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .close-btn:hover { background: #16a34a; }
    .brand { margin-top: 32px; font-size: 0.8rem; color: #52525b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
    <h1>App Connected!</h1>
    <p>Your account has been linked successfully. You can close this tab and return to TaskBolt.</p>
    <button class="close-btn" onclick="window.close()">Close &amp; Return</button>
    <div class="brand">TaskBolt &middot; Powered by Qosta</div>
  </div>
</body>
</html>
