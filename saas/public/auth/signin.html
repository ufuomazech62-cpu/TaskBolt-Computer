<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — TaskBolt</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container { max-width: 400px; width: 90%; text-align: center; }
.logo-wrap {
  width: 80px; height: 80px; margin: 0 auto 1.5rem;
  border-radius: 20px;
  background: linear-gradient(135deg, #FF9A1F, #FF2F92, #C026FF);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(255, 47, 146, 0.25);
}
.logo-wrap img { width: 56px; height: 56px; border-radius: 12px; }
h1 { font-family: 'Instrument Serif', serif; font-size: 2.4rem; margin-bottom: 0.3rem; letter-spacing: -0.02em; }
.subtitle { color: rgba(255,255,255,0.45); margin-bottom: 2.5rem; font-size: 0.95rem; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 14px 20px; border: none; border-radius: 12px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; margin-bottom: 12px; text-decoration: none;
}
.btn-taskbolt {
  background: linear-gradient(135deg, #FF9A1F, #FF2F92, #C026FF);
  color: white;
  font-size: 1rem;
  padding: 16px 20px;
}
.btn-taskbolt:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255, 47, 146, 0.35); }
.btn-taskbolt:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-taskbolt svg { width: 22px; height: 22px; }

.btn-email {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
}
.btn-email:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
.btn-email:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn svg { width: 20px; height: 20px; }

.divider {
  display: flex; align-items: center; gap: 16px;
  color: rgba(255,255,255,0.25); font-size: 0.8rem;
  margin: 1.5rem 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
}

.note { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-top: 2rem; }
.note a { color: rgba(255,255,255,0.5); text-decoration: none; }
.note a:hover { color: rgba(255,255,255,0.8); }

.status { display: none; margin-top: 1rem; padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; }
.status.loading { display: block; background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.15); }
.status.error { display: block; background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.15); }
.status.success { display: block; background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.15); }

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(96,165,250,0.3); border-top-color: #60a5fa;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Email form */
.email-form { display: flex; gap: 8px; margin-bottom: 12px; }
.email-input {
  flex: 1; padding: 14px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 0.95rem; outline: none;
  transition: border-color 0.2s;
}
.email-input:focus { border-color: rgba(255,154,31,0.5); }
.email-input::placeholder { color: rgba(255,255,255,0.25); }

/* OTP input */
.otp-section { display: none; }
.otp-section.active { display: block; }
.otp-input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 1.2rem; text-align: center; letter-spacing: 8px;
  outline: none; transition: border-color 0.2s; margin-bottom: 12px;
}
.otp-input:focus { border-color: rgba(255,154,31,0.5); }
.otp-input::placeholder { letter-spacing: normal; font-size: 0.9rem; color: rgba(255,255,255,0.25); }
.otp-label { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 8px; text-align: left; }
.back-link { color: rgba(255,255,255,0.35); font-size: 0.8rem; cursor: pointer; margin-top: 12px; display: inline-block; }
.back-link:hover { color: rgba(255,255,255,0.7); }
.credits-note { color: rgba(255,255,255,0.3); font-size: 0.8rem; margin-top: 0.5rem; }
.credits-note span { color: #4ade80; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap"><img src="/icon.png" alt="TaskBolt"></div>
  <h1>TaskBolt</h1>
  <p class="subtitle">Sign in to manage your account</p>

  <button class="btn btn-taskbolt" id="googleBtn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
    Sign in to TaskBolt
  </button>

  <div class="divider">or sign in with email</div>

  <!-- Email passwordless -->
  <div id="emailSection">
    <div class="email-form">
      <input type="email" id="emailInput" class="email-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn btn-email" id="sendCodeBtn" onclick="sendCode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      Continue with Email
    </button>
    <p class="credits-note">New here? You'll get <span>500 free credits</span></p>
  </div>

  <!-- OTP verification -->
  <div id="otpSection" class="otp-section">
    <p class="otp-label">Enter the 6-digit code sent to <strong id="otpEmail"></strong></p>
    <input type="text" id="otpInput" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <button class="btn btn-taskbolt" id="verifyBtn" onclick="verifyCode()">Verify & Sign In</button>
    <span class="back-link" onclick="goBackToEmail()">← Use a different email</span>
  </div>

  <div id="status" class="status"></div>

  <p class="note">
    Don't have the app yet? <a href="/">Download TaskBolt</a>
  </p>
</div>

<script>
let signing = false;
let pendingEmail = '';

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = `status ${type}`;
  el.innerHTML = (type === 'loading' ? '<span class="spinner"></span>' : '') + msg;
}
function hideStatus() { document.getElementById('status').className = 'status'; }

document.getElementById('emailInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendCode(); });
document.getElementById('otpInput').addEventListener('keydown', e => { if (e.key === 'Enter') verifyCode(); });

async function sendCode() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) { showStatus('Please enter a valid email', 'error'); return; }
  if (signing) return;
  signing = true; hideStatus();
  document.getElementById('sendCodeBtn').disabled = true;
  try {
    const res = await fetch('https://taskbolt.space/api/auth/email?action=send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.ok) {
      pendingEmail = email;
      document.getElementById('otpEmail').textContent = email;
      document.getElementById('emailSection').style.display = 'none';
      document.getElementById('otpSection').classList.add('active');
      document.getElementById('otpInput').focus();
      showStatus('Code sent! Check your inbox.', 'success');
    } else { showStatus(data.error || 'Failed to send code', 'error'); }
  } catch (e) { showStatus('Network error. Please try again.', 'error'); }
  signing = false; document.getElementById('sendCodeBtn').disabled = false;
}

async function verifyCode() {
  const code = document.getElementById('otpInput').value.trim();
  if (!code || code.length < 6) { showStatus('Enter the 6-digit code', 'error'); return; }
  if (signing) return;
  signing = true; showStatus('Verifying...', 'loading');
  document.getElementById('verifyBtn').disabled = true;
  try {
    const res = await fetch('https://taskbolt.space/api/auth/email?action=verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail, code })
    });
    const data = await res.json();
    if (data.ok && data.token) {
      localStorage.setItem('tb_auth_token', data.token); hideStatus();
      const isDesktop = new URLSearchParams(window.location.search).get('desktop') === 'true';
      if (isDesktop) {
        showStatus('Signed in! Redirecting...', 'loading');
        window.location.href = `https://taskbolt.space/api/desktop-callback?token=${encodeURIComponent(data.token)}`;
      } else {
        showStatus('Signed in! Redirecting to dashboard...', 'loading');
        window.location.href = '/dashboard.html';
      }
    } else { showStatus(data.error || 'Invalid code', 'error'); }
  } catch (e) { showStatus('Network error. Please try again.', 'error'); }
  signing = false; document.getElementById('verifyBtn').disabled = false;
}

function goBackToEmail() {
  document.getElementById('otpSection').classList.remove('active');
  document.getElementById('emailSection').style.display = 'block';
  document.getElementById('emailInput').value = pendingEmail;
  document.getElementById('emailInput').focus();
  hideStatus();
}

async function signInWithGoogle() {
  if (signing) return;
  signing = true;
  showStatus('Opening sign-in...', 'loading');
  const session = crypto.randomUUID();
  const popup = window.open(
    `https://taskbolt.space/api/auth/google?session=${session}`,
    'google-auth', 'width=500,height=600,menubar=no,toolbar=no'
  );
  const pollInterval = setInterval(async () => {
    try {
      const res = await fetch(`https://taskbolt.space/api/auth/google?action=poll&session=${session}`);
      const data = await res.json();
      if (data.ok && data.token) {
        clearInterval(pollInterval); popup.close();
        localStorage.setItem('tb_auth_token', data.token);
        showStatus('Signed in! Redirecting...', 'loading');
        const isDesktop = new URLSearchParams(window.location.search).get('desktop') === 'true';
        if (isDesktop) {
          window.location.href = `https://taskbolt.space/api/desktop-callback?token=${encodeURIComponent(data.token)}`;
        } else { window.location.href = '/dashboard.html'; }
      }
    } catch (e) {}
  }, 1500);
  setTimeout(() => {
    clearInterval(pollInterval); if (!popup.closed) popup.close();
    showStatus('Sign-in timed out. Please try again.', 'error');
    signing = false;
  }, 120000);
}
</script>
</body>
</html>
