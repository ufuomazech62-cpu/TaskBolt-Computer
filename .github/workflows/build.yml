name: Build TaskBolt Desktop

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone hermes-engine
        shell: pwsh
        run: |
          if (-not (Test-Path "hermes-engine")) {
            git clone --depth 1 https://github.com/NousResearch/hermes-agent.git hermes-engine
          }
          Copy-Item taskbolt_bridge.py hermes-engine/taskbolt_bridge.py -Force
          Write-Host "hermes-engine ready with bridge script"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles nsis,msi

      - name: Upload Windows NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskBolt-Windows-Setup
          path: src-tauri/target/release/bundle/nsis/

      - name: Upload Windows MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskBolt-Windows-MSI
          path: src-tauri/target/release/bundle/msi/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone hermes-engine
        run: |
          if [ ! -d "hermes-engine" ]; then
            git clone --depth 1 https://github.com/NousResearch/hermes-agent.git hermes-engine
          fi
          cp taskbolt_bridge.py hermes-engine/taskbolt_bridge.py
          echo "hermes-engine ready with bridge script"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (DMG)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TaskBolt-macOS-DMG
          path: src-tauri/target/release/bundle/dmg/
